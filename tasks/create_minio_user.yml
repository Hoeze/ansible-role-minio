---

- name: Check whether user is already configured
  ansible.builtin.command: "{{ mc_command }} admin user info {{ minio_alias }} {{ user.name }} --json"
  register: get_user
  changed_when: false
  failed_when: false

- name: Create user if missing
  ansible.builtin.command: "{{ mc_command }} admin user add {{ minio_alias }} {{ user.name }} {{ user.password }}"
  register: add_user
  when: (get_user.stdout | from_json)['status'] != "success"
  changed_when: true

- name: Validate bucket ACL policies
  ansible.builtin.assert:
    that:
      - user.buckets_acl | default([]) | map(attribute='policy') | difference(['read-write','read-only','write-only','custom']) | length == 0
    fail_msg: "Invalid policy type in user {{ user.name }}"

- name: Create user's policy file
  ansible.builtin.copy:
    dest: "{{ minio_policy_dir }}/{{ user.name }}.json"
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0640"
    content: >-
      {%- set statements = [] -%}
      {%- for acl in user.buckets_acl | default([]) -%}
        {%- if acl['policy'] == 'read-write' -%}
          {%- set _ = (acl['name'] | mandatory('bucket name missing for read-write policy')) -%}
          {%- set _ = statements.append({
            "Effect": "Allow",
            "Action": [
              "s3:DeleteObject",
              "s3:GetObject",
              "s3:ListBucket",
              "s3:PutObject"
            ],
            "Resource": [
              "arn:aws:s3:::{{ acl['name'] }}",
              "arn:aws:s3:::{{ acl['name'] }}/*"
            ]
          }) -%}
        {%- elif acl['policy'] == 'read-only' -%}
          {%- set _ = (acl['name'] | mandatory('bucket name missing for read-only policy')) -%}
          {%- set _ = statements.append({
            "Effect": "Allow",
            "Action": [
              "s3:GetObject",
              "s3:ListBucket"
            ],
            "Resource": [
              "arn:aws:s3:::{{ acl['name'] }}",
              "arn:aws:s3:::{{ acl['name'] }}/*"
            ]
          }) -%}
        {%- elif acl['policy'] == 'write-only' -%}
          {%- set _ = (acl['name'] | mandatory('bucket name missing for write-only policy')) -%}
          {%- set _ = statements.append({
            "Effect": "Allow",
            "Action": [
              "s3:PutObject"
            ],
            "Resource": [
              "arn:aws:s3:::{{ acl['name'] }}/*"
            ]
          }) -%}
        {%- elif acl['policy'] == 'custom' -%}
          {%- for custom in acl.custom | default([]) -%}
            {%- set rule = custom['rule'] -%}
            {%- if rule is string -%}
              {%- set rule = rule | from_json -%}
            {%- endif -%}
            {%- set _ = statements.append(rule) -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{
        {
          "Version": "2012-10-17",
          "Statement": statements,
        } | to_nice_json
      }}
  register: create_policy

- name: Register user policy in MinIO if the policy file was created/changed
  ansible.builtin.command: "{{ mc_command }} admin policy create {{ minio_alias }} {{ user.name }} {{ minio_policy_dir }}/{{ user.name }}.json"
  register: add_policy
  when: create_policy.changed
  changed_when: true

- name: Get policies attached to user
  ansible.builtin.command: "{{ mc_command }} admin policy entities {{ minio_alias }} --user {{ user.name }} --json"
  register: get_policies
  changed_when: false
  failed_when: get_policies.rc != 0 or (get_policies.stdout | from_json)['status'] != "success"

- name: Extract policies
  ansible.builtin.set_fact:
    user_policies: "{{ (((get_policies.stdout | from_json).result.userMappings | default([]) | first | default({})).policies | default([])) }}"

- name: Attach policy to user if missing
  ansible.builtin.command: "{{ mc_command }} admin policy attach {{ minio_alias }} {{ user.name }} -u {{ user.name }}"
  register: apply_policy
  when: user.name not in user_policies
  changed_when: true
